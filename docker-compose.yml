version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: ayursmart_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ayursmart
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend1
    container_name: ayursmart_backend
    restart: always
    ports:
      - "5100:5100"
    environment:
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ayursmart
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend1
    container_name: ayursmart_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
